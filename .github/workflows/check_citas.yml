name: Monitor Citas Huellas Sevilla

on:
  workflow_dispatch:
  repository_dispatch:
    types: [check-citas-huellas]
  schedule:
    - cron: "*/5 * * * *"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install chromium
          playwright install-deps chromium

      # ===== DIAGNÓSTICO: ver si la IP de GitHub puede llegar a la web =====
      - name: Test connectivity to sede portal
        run: |
          echo "=== Test 1: sede.administracionespublicas.gob.es ==="
          curl -v --max-time 30 -o /dev/null -w "HTTP_CODE=%{http_code}  TIME=%{time_total}s\n" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36" \
            "https://sede.administracionespublicas.gob.es/pagina/index/directorio/icpplus/" || echo "FALLÓ sede"
          echo ""
          echo "=== Test 2: icp.administracionelectronica.gob.es ==="
          curl -v --max-time 30 -o /dev/null -w "HTTP_CODE=%{http_code}  TIME=%{time_total}s\n" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36" \
            "https://icp.administracionelectronica.gob.es/icpplus/index.html" || echo "FALLÓ icp"
          echo ""
          echo "=== IP pública del runner ==="
          curl -s https://api.ipify.org && echo ""
        continue-on-error: true

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN_HUELLAS: ${{ secrets.TELEGRAM_BOT_TOKEN_HUELLAS }}
          TELEGRAM_CHAT_ID_HUELLAS: ${{ secrets.TELEGRAM_CHAT_ID_HUELLAS }}
        run: python -u monitor_citas.py
